services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketapp_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      DB_CONNECTION: sqlsrv
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_DATABASE: ticketdb
      DB_USERNAME: sa
      DB_PASSWORD: MiClaveSegura2026!
    working_dir: /var/www
    depends_on:
      sqlserver:
        condition: service_healthy
    command: >
      bash -lc "composer install --no-interaction --prefer-dist && \
      php artisan key:generate --force && \
      php artisan migrate --force && \
      php artisan serve --host=0.0.0.0 --port=8000"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ticketapp_sqlserver
    environment:
      SA_PASSWORD: "MiClaveSegura2026!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'MiClaveSegura2026!' -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
