version: '3.9'

services:
  app:
    build: .
    container_name: laravel_api_app
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
    depends_on:
      - sqlserver

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "YourStrongPassword123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"