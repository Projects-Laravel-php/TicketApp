version: '3.8'

services:
  app:
    image: mcr.microsoft.com/devcontainers/php:8.4-bullseye
    container_name: laravel_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "8000:8000"
    command: >
      bash -c "composer install && php artisan serve --host=0.0.0.0 --port=8000"
    depends_on:
      - db

  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: sql_server
    environment:
      SA_PASSWORD: "MiClaveSegura2026!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P MiClaveSegura2026! -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
